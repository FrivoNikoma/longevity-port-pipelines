<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">
  <defs>
    <filter id="ds"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="520" rx="10" fill="#f0f4fa"/>

  <!-- Funnel ladder: each rung is a colored trapezoid that narrows -->
  <!-- Left and right rails (converging lines) -->
  <line x1="20" y1="20" x2="100" y2="470" stroke="#1a3060" stroke-width="4" stroke-linecap="round"/>
  <line x1="500" y1="20" x2="420" y2="470" stroke="#1a3060" stroke-width="4" stroke-linecap="round"/>

  <!-- Rung 1: Complex-level signal — WIDEST -->
  <g>
    <polygon points="30,18 490,18 488,72 32,72" fill="#2d5090" rx="8" filter="url(#ds)"/>
    <rect x="30" y="18" width="460" height="54" rx="8" fill="#2d5090" filter="url(#ds)"/>
    <text x="260" y="42" text-anchor="middle" fill="white" font-size="16" font-weight="800">Complex-level signal</text>
    <text x="260" y="62" text-anchor="middle" fill="#c0d4f0" font-size="12">Interface enrichment and divergence summaries</text>
  </g>

  <!-- Rung 2: Residue-level signal -->
  <g>
    <rect x="46" y="84" width="428" height="54" rx="8" fill="#3498db" filter="url(#ds)"/>
    <text x="260" y="108" text-anchor="middle" fill="white" font-size="16" font-weight="800">Residue-level signal</text>
    <text x="260" y="128" text-anchor="middle" fill="#c0e0f8" font-size="12">Divergence mapped to individual residue positions</text>
  </g>

  <!-- Rung 3: Divergence-profile clustering -->
  <g>
    <rect x="62" y="150" width="396" height="54" rx="8" fill="#e67e22" filter="url(#ds)"/>
    <text x="260" y="174" text-anchor="middle" fill="white" font-size="16" font-weight="800">Divergence-profile clustering</text>
    <text x="260" y="194" text-anchor="middle" fill="#fde4c4" font-size="12">Regimes of interface remodeling (PCA + k-means)</text>
  </g>

  <!-- Rung 4: Manual-review shortlist -->
  <g>
    <rect x="78" y="216" width="364" height="54" rx="8" fill="#f39c12" filter="url(#ds)"/>
    <text x="260" y="240" text-anchor="middle" fill="white" font-size="16" font-weight="800">Manual-review shortlist</text>
    <text x="260" y="260" text-anchor="middle" fill="#fef0c8" font-size="12">Top candidate residues per complex per species</text>
  </g>

  <!-- Rung 5: Structure remapping QC -->
  <g>
    <rect x="94" y="282" width="332" height="54" rx="8" fill="#8e44ad" filter="url(#ds)"/>
    <text x="260" y="306" text-anchor="middle" fill="white" font-size="16" font-weight="800">Structure remapping QC</text>
    <text x="260" y="326" text-anchor="middle" fill="#e0c8f0" font-size="12">Alignment-based residue remap to PDB</text>
  </g>

  <!-- Rung 6: Viewer-ready selections -->
  <g>
    <rect x="110" y="348" width="300" height="54" rx="8" fill="#16a085" filter="url(#ds)"/>
    <text x="260" y="372" text-anchor="middle" fill="white" font-size="16" font-weight="800">Viewer-ready selections</text>
    <text x="260" y="392" text-anchor="middle" fill="#c0f0e0" font-size="12">PyMOL / ChimeraX commands exported</text>
  </g>

  <!-- Rung 7: Manual 3D review — NARROWEST -->
  <g>
    <rect x="126" y="414" width="268" height="54" rx="8" fill="#1e8449" filter="url(#ds)"/>
    <text x="260" y="438" text-anchor="middle" fill="white" font-size="16" font-weight="800">Manual 3D review</text>
    <text x="260" y="458" text-anchor="middle" fill="#c0f0d0" font-size="12">Structural interpretation</text>
  </g>

  <!-- Bottom label -->
  <text x="260" y="496" text-anchor="middle" fill="#1a3060" font-size="13" font-weight="700">From global computational signal to</text>
  <text x="260" y="514" text-anchor="middle" fill="#1a3060" font-size="13" font-weight="700">structurally grounded, reviewable hypotheses</text>
</svg>
