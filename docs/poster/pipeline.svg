<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 580" font-family="Helvetica Neue,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5 0 10z" fill="#7090c0"/>
    </marker>
    <filter id="s"><feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/></filter>
  </defs>

  <!-- Background -->
  <rect width="520" height="580" rx="10" fill="#f0f4fa"/>

  <!-- Step 1 -->
  <g transform="translate(20,12)">
    <circle cx="18" cy="18" r="18" fill="#2d5090"/><text x="18" y="24" text-anchor="middle" fill="white" font-size="16" font-weight="800">1</text>
    <text x="44" y="24" fill="#162040" font-size="15" font-weight="700">Select longevity complexes</text>
    <rect x="0" y="38" width="220" height="50" rx="8" fill="white" stroke="#c8d4e8" filter="url(#s)"/>
    <text x="110" y="58" text-anchor="middle" fill="#444" font-size="11">PINDER PPI structures</text>
    <text x="110" y="74" text-anchor="middle" fill="#444" font-size="11">STRING v12.5 hub scores</text>
    <!-- mini protein icons -->
    <g transform="translate(240,38)">
      <rect width="60" height="50" rx="6" fill="#e8eef8" stroke="#b0c0d8"/>
      <circle cx="20" cy="20" r="8" fill="#5b7fbf" opacity="0.7"/>
      <circle cx="40" cy="20" r="8" fill="#e67e22" opacity="0.7"/>
      <line x1="28" y1="20" x2="32" y2="20" stroke="#333" stroke-width="1.5"/>
      <text x="30" y="44" text-anchor="middle" fill="#666" font-size="8">PPI pairs</text>
    </g>
  </g>

  <line x1="130" y1="102" x2="130" y2="116" stroke="#7090c0" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 2 -->
  <g transform="translate(20,118)">
    <circle cx="18" cy="18" r="18" fill="#2d5090"/><text x="18" y="24" text-anchor="middle" fill="white" font-size="16" font-weight="800">2</text>
    <text x="44" y="24" fill="#162040" font-size="15" font-weight="700">Fetch orthologs</text>
    <rect x="0" y="38" width="220" height="50" rx="8" fill="white" stroke="#c8d4e8" filter="url(#s)"/>
    <text x="110" y="58" text-anchor="middle" fill="#444" font-size="11">OMA + UniProt mapping</text>
    <text x="110" y="74" text-anchor="middle" fill="#444" font-size="11">3 species per complex</text>
    <!-- species icons -->
    <g transform="translate(240,38)">
      <rect width="240" height="50" rx="6" fill="white" stroke="#c8d4e8"/>
      <text x="12" y="20" fill="#1a6838" font-size="18">🐀</text><text x="36" y="20" fill="#333" font-size="10">Naked mole-rat</text>
      <text x="12" y="36" fill="#5b2d8e" font-size="18">🦇</text><text x="36" y="36" fill="#333" font-size="10">Little brown bat</text>
      <text x="140" y="20" fill="#888" font-size="18">🐁</text><text x="164" y="20" fill="#888" font-size="10">Mouse (ref)</text>
    </g>
  </g>

  <line x1="130" y1="208" x2="130" y2="222" stroke="#7090c0" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 3 -->
  <g transform="translate(20,224)">
    <circle cx="18" cy="18" r="18" fill="#2d5090"/><text x="18" y="24" text-anchor="middle" fill="white" font-size="16" font-weight="800">3</text>
    <text x="44" y="24" fill="#162040" font-size="15" font-weight="700">ESM C 600M embeddings</text>
    <rect x="0" y="38" width="220" height="50" rx="8" fill="white" stroke="#c8d4e8" filter="url(#s)"/>
    <text x="110" y="58" text-anchor="middle" fill="#444" font-size="11">Biohub REST API</text>
    <text x="110" y="74" text-anchor="middle" fill="#444" font-size="11">Per-residue vectors</text>
    <!-- embedding grid icon -->
    <g transform="translate(240,38)">
      <rect width="100" height="50" rx="6" fill="#e8eef8" stroke="#b0c0d8"/>
      <g transform="translate(10,8)">
        <rect x="0" y="0" width="8" height="8" fill="#2d5090" opacity="0.3"/><rect x="10" y="0" width="8" height="8" fill="#2d5090" opacity="0.7"/>
        <rect x="20" y="0" width="8" height="8" fill="#2d5090" opacity="0.5"/><rect x="30" y="0" width="8" height="8" fill="#e67e22" opacity="0.8"/>
        <rect x="0" y="10" width="8" height="8" fill="#2d5090" opacity="0.6"/><rect x="10" y="10" width="8" height="8" fill="#e67e22" opacity="0.9"/>
        <rect x="20" y="10" width="8" height="8" fill="#2d5090" opacity="0.4"/><rect x="30" y="10" width="8" height="8" fill="#2d5090" opacity="0.2"/>
        <rect x="0" y="20" width="8" height="8" fill="#e67e22" opacity="0.7"/><rect x="10" y="20" width="8" height="8" fill="#2d5090" opacity="0.5"/>
        <rect x="20" y="20" width="8" height="8" fill="#e67e22" opacity="0.6"/><rect x="30" y="20" width="8" height="8" fill="#2d5090" opacity="0.8"/>
      </g>
      <text x="62" y="22" fill="#666" font-size="9">interface</text>
      <text x="62" y="34" fill="#666" font-size="9">vs</text>
      <text x="62" y="46" fill="#666" font-size="9">background</text>
    </g>
  </g>

  <line x1="130" y1="314" x2="130" y2="328" stroke="#7090c0" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 4 -->
  <g transform="translate(20,330)">
    <circle cx="18" cy="18" r="18" fill="#e67e22"/><text x="18" y="24" text-anchor="middle" fill="white" font-size="16" font-weight="800">4</text>
    <text x="44" y="24" fill="#162040" font-size="15" font-weight="700">Interface enrichment analysis</text>
    <rect x="0" y="38" width="480" height="36" rx="8" fill="#fff4e6" stroke="#e8c890" filter="url(#s)"/>
    <text x="240" y="61" text-anchor="middle" fill="#6b4400" font-size="12" font-weight="600">Compare interface vs non-interface embedding deltas · Cohen's d effect sizes</text>
  </g>

  <line x1="130" y1="406" x2="130" y2="420" stroke="#7090c0" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 5 -->
  <g transform="translate(20,422)">
    <circle cx="18" cy="18" r="18" fill="#8e44ad"/><text x="18" y="24" text-anchor="middle" fill="white" font-size="16" font-weight="800">5</text>
    <text x="44" y="24" fill="#162040" font-size="15" font-weight="700">Structure remapping QC</text>
    <rect x="0" y="38" width="480" height="36" rx="8" fill="#f4ecf7" stroke="#c8a0d8" filter="url(#s)"/>
    <text x="240" y="61" text-anchor="middle" fill="#5b2d82" font-size="12" font-weight="600">Alignment-based remap to PDB numbering · 11/11 groups pass</text>
  </g>

  <line x1="130" y1="498" x2="130" y2="512" stroke="#7090c0" stroke-width="2" marker-end="url(#a)"/>

  <!-- Step 6 -->
  <g transform="translate(20,514)">
    <circle cx="18" cy="18" r="18" fill="#1e8449"/><text x="18" y="24" text-anchor="middle" fill="white" font-size="16" font-weight="800">6</text>
    <text x="44" y="24" fill="#162040" font-size="15" font-weight="700">Manual 3D review (ChimeraX)</text>
    <rect x="0" y="38" width="480" height="26" rx="8" fill="#eaf7ef" stroke="#a0d0b0" filter="url(#s)"/>
    <text x="240" y="56" text-anchor="middle" fill="#145a32" font-size="12" font-weight="600">Viewer-ready selections → structural interpretation of divergence signal</text>
  </g>
</svg>
