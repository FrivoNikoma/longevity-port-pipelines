name: g3sx30_wrapper_command_contract_scaffold
description: >
  Non-executable scaffold for the future G3SX30 wrapper command contract.
  This layer can describe expected future command/argument/output-path
  policy, but it must not claim that actual CLI help was observed or that
  actual CLI flags were verified.
status: future_command_contract_scaffold_only_runtime_blocked
sources:
  wrapper_scaffold_row: data/interim/g3sx30_manifest_aware_dry_run_wrapper_scaffold.csv#1
  policy_contract_row: data/input/g3sx30_manifest_aware_adapter_policy_contract.csv#1
  manifest_row: data/input/g3sx30_dry_run_preflight_manifest.csv#1
layer_separation:
  wrapper_scaffold: boundary represented; no command, output path, or execution plan selected
  command_contract_scaffold: expected future command/args/output policy represented
  help_observation: future evidence layer, not this scaffold
  source_guardrail: future guardrail layer, not this scaffold
  execution: not authorized by this scaffold
allowed_language:
  - expected_future_command_contract
  - required_future_args
  - forbidden_future_args
  - unverified_until_help_or_source_guardrail
  - future_command_contract_scaffold_only
forbidden_language:
  - actual_supported_args
  - observed_help_flags
  - verified_cli_contract
allowed_command_contract_statuses:
  - command_contract_scaffold_runtime_blocked
allowed_command_contract_decisions:
  - define_future_command_contract_only
allowed_next_actions_after_command_contract:
  - add_wrapper_source_guardrail_pr
  - add_wrapper_help_observation_note_pr
  - keep_runtime_blocked
does_not_authorize:
  - pyproject script entry point
  - Typer executable wrapper
  - wrapper execution
  - dry-run execution
  - live execution
  - actual command run
  - --help run
  - observed-help claims
  - actual CLI flag verification claims
  - Biohub call
  - ESMC call
  - embedding generation
  - .npy artifact
  - data/output artifact commit
  - ready_for_preflight
  - manifest runtime unlock
  - Gate 8 promotion
  - Gate 9 promotion
  - Boltz call
  - AF3 call
  - Chai call
  - enrichment rerun
  - contrast rerun
  - biological claim
