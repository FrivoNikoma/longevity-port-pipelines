schema_version: 1
schema_id: g3sx30_dry_run_preflight_manifest_schema
pipeline_gate: g3sx30_dry_run_preflight_manifest
claim_policy: no_biological_claims_until_validation
maximum_claim_status: technical_checkpoint
description: >
  Conservative G3SX30 dry-run preflight manifest table.
purpose: >
  Records the first G3SX30 dry-run preflight manifest row. The row references
  the first G3SX30 dry-run preflight decision row in
  data/input/g3sx30_dry_run_preflight_decisions.csv#1. This manifest entry is
  dry-run-only, keeps max_live_batch_size at 0, keeps ready_for_preflight false,
  does not run curated_embedding_preflight, does not run curated_embedding_single,
  does not call Biohub / ESMC, does not generate embeddings, does not create .npy
  artifacts, does not promote Gate 8 or Gate 9, does not call Boltz, AF3, or
  Chai, and does not make biological claims.

scaffold_scope:
  source_layer: g3sx30_dry_run_preflight_decision
  source_table: data/input/g3sx30_dry_run_preflight_decisions.csv
  source_row_index: 1
  source_row_requirement: first G3SX30 dry-run preflight decision row
  scaffold_status: one_g3sx30_dry_run_preflight_manifest_row_runtime_blocked
  current_g3sx30_source_dry_run_preflight_decision: approve_dry_run_preflight_for_planning
  current_g3sx30_source_dry_run_preflight_status_after_decision: dry_run_preflight_planning_approved_runtime_blocked
  current_g3sx30_source_allowed_next_action_after_decision: prepare_later_dry_run_preflight_manifest_pr
  current_g3sx30_source_max_live_batch_size_after_decision: 0
  current_g3sx30_source_ready_for_preflight_after_decision: "false"
  current_g3sx30_reviewed_sequence_length: 492
  current_g3sx30_reviewed_sequence_sha256: "e288c6985ffcebe527716261c213e00a44f5f9acf0280eaa433154f6e19eab4f"
  current_g3sx30_manifest_entry_status: manifest_scaffold_ready_runtime_blocked
  current_g3sx30_dry_run_only: true
  current_g3sx30_max_live_batch_size: 0
  current_g3sx30_ready_for_preflight_after_manifest: "false"
  current_g3sx30_sequence_fetch_allowed: false
  current_g3sx30_biohub_call_allowed: false
  current_g3sx30_esmc_call_allowed: false
  current_g3sx30_embedding_generation_allowed: false
  current_g3sx30_curated_embedding_preflight_allowed: false
  current_g3sx30_curated_embedding_single_allowed: false
  current_g3sx30_runtime_status_after_manifest: still_not_ready_for_preflight
  does_not_authorize:
    - sequence fetch
    - Biohub calls
    - ESMC calls
    - embedding generation
    - curated_embedding_preflight
    - curated_embedding_single
    - ready_for_preflight
    - data/output commits
    - .npy artifacts
    - Gate 8 eligibility
    - Gate 9 eligibility
    - Boltz calls
    - AF3 calls
    - Chai calls
    - enrichment rerun
    - contrast rerun
    - biological claims

required_columns:
  - candidate_set
  - lane_name
  - candidate_id
  - source_dry_run_preflight_decision_table
  - source_dry_run_preflight_decision_row_index
  - target_accession
  - target_accession_db
  - target_species
  - target_taxid
  - gene_symbol
  - source_dry_run_preflight_decision
  - source_dry_run_preflight_status_after_decision
  - source_allowed_next_action_after_decision
  - source_max_live_batch_size_after_decision
  - source_ready_for_preflight_after_decision
  - reviewed_sequence_sha256
  - reviewed_sequence_length
  - manifest_entry_status
  - dry_run_only
  - max_live_batch_size
  - ready_for_preflight_after_manifest
  - sequence_fetch_allowed
  - biohub_call_allowed
  - esmc_call_allowed
  - embedding_generation_allowed
  - curated_embedding_preflight_allowed
  - curated_embedding_single_allowed
  - claim_policy
  - claim_status
  - review_note
  - reviewer_id
  - review_date
  - forbidden_actions

allowed_source_dry_run_preflight_decision_tables:
  - data/input/g3sx30_dry_run_preflight_decisions.csv

allowed_manifest_entry_statuses:
  - manifest_scaffold_ready_runtime_blocked
  - manifest_entry_deferred_still_blocked

required_manifest_defaults:
  dry_run_only: true
  max_live_batch_size: 0
  ready_for_preflight_after_manifest: "false"
  sequence_fetch_allowed: false
  biohub_call_allowed: false
  esmc_call_allowed: false
  embedding_generation_allowed: false
  curated_embedding_preflight_allowed: false
  curated_embedding_single_allowed: false
  gate8_eligible: false
  gate9_eligible: false
  boltz_ready: false
  af3_ready: false
  chai_ready: false
  biological_claim_allowed: false

required_guardrails:
  - manifest row does not fetch sequences
  - manifest row does not call Biohub
  - manifest row does not call ESMC
  - manifest row does not generate embeddings
  - manifest row does not run curated_embedding_preflight
  - manifest row does not run curated_embedding_single
  - manifest row does not mark ready_for_preflight
  - manifest row does not create .npy artifacts
  - manifest row does not commit data/output artifacts
  - manifest row does not promote Gate 8
  - manifest row does not promote Gate 9
  - manifest row does not call Boltz
  - manifest row does not call AF3
  - manifest row does not call Chai
  - manifest row does not rerun enrichment or contrast
  - manifest row does not make biological claims

allowed_language:
  - dry-run preflight manifest row
  - source dry-run preflight decision row 1
  - manifest_scaffold_ready_runtime_blocked
  - dry_run_only=true
  - max_live_batch_size=0
  - still not ready_for_preflight
  - later explicit dry-run preflight execution PR

disallowed_language:
  - curated_embedding_preflight run
  - curated_embedding_single run
  - Biohub call
  - ESMC call
  - embedding generated
  - .npy artifact committed
  - ready_for_preflight
  - Gate 8 eligible
  - Gate 9 eligible
  - Boltz ready
  - AF3 ready
  - Chai ready
  - validated longevity signal
  - validated biological hit
  - confirmed binding change
  - confirmed functional effect
  - safe to port
  - proven pro-longevity variant
