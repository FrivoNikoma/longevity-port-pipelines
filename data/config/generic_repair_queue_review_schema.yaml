schema_version: 1
schema_id: generic_repair_queue_review_schema
pipeline_gate: repair_decisions
claim_policy: no_biological_claims_until_validation
maximum_claim_status: repair_worklist
description: >
  Generic LongevityPort schema for machine-readable reviewed decisions
  on Gate 4 / Gate 5 repair queue rows.
purpose: >
  Defines how a reviewed provenance decision should be recorded after a
  human reviewer applies the generic repair queue review checklist. The
  schema preserves blocker-first semantics: an unreviewed row is a valid
  blocked repair-queue worklist item, not an invalid row.

review_scope:
  from_status: unreviewed_gate4_gate5_blocker
  to_status: reviewed_for_planning_provenance_evidence
  does_not_authorize:
    - Gate 8 eligibility
    - Gate 9 eligibility
    - embedding generation
    - Boltz readiness
    - validated ortholog claims
    - validated biological signal claims

required_pre_review_fields:
  - candidate_set
  - lane_name
  - candidate_id
  - source_table
  - source_row_index
  - gene_symbol
  - source_species
  - target_species
  - target_species_taxid
  - source_uniprot
  - partner_uniprot
  - target_uniprot_before_review
  - coverage_status_before_review
  - provenance_status_before_review
  - repair_queue_status_before_review
  - downstream_block_status_before_review
  - allowed_next_action_before_review
  - claim_policy_before_review

required_review_fields:
  - review_decision
  - reviewed_target_uniprot
  - reviewed_source_database
  - reviewed_source_accession
  - reviewed_sequence_length
  - reviewed_taxid
  - review_evidence_uri_or_note
  - reviewer_note
  - downstream_block_status_after_review
  - allowed_next_action_after_review
  - claim_policy_after_review
  - claim_status_after_review
  - forbidden_actions_after_review

allowed_review_decisions:
  - accepted_for_planning_after_review
  - rejected_after_review
  - deferred_pending_source
  - needs_second_reviewer

status_groups:
  reviewed_for_planning:
    - accepted_for_planning_after_review
  blocked:
    - rejected_after_review
    - deferred_pending_source
    - needs_second_reviewer

review_decision_rules:
  accepted_for_planning_after_review:
    gate4_gate5_policy_update_allowed: true
    gate8_eligible: false
    gate9_eligible: false
    embedding_ready: false
    boltz_ready: false
    validated_ortholog_claim_allowed: false
    biological_claim_allowed: false
    downstream_block_status_after_review: reviewed_for_planning_still_policy_blocked
    allowed_next_action_after_review: consider_later_explicit_gate4_gate5_policy_update
    claim_status_after_review: repair_worklist
  rejected_after_review:
    gate4_gate5_policy_update_allowed: false
    gate8_eligible: false
    gate9_eligible: false
    embedding_ready: false
    boltz_ready: false
    validated_ortholog_claim_allowed: false
    biological_claim_allowed: false
    downstream_block_status_after_review: blocked_gate4_gate5
    allowed_next_action_after_review: keep_row_excluded_from_downstream_planning
    claim_status_after_review: repair_worklist
  deferred_pending_source:
    gate4_gate5_policy_update_allowed: false
    gate8_eligible: false
    gate9_eligible: false
    embedding_ready: false
    boltz_ready: false
    validated_ortholog_claim_allowed: false
    biological_claim_allowed: false
    downstream_block_status_after_review: blocked_gate4_gate5
    allowed_next_action_after_review: defer_until_stronger_source_evidence_exists
    claim_status_after_review: repair_worklist
  needs_second_reviewer:
    gate4_gate5_policy_update_allowed: false
    gate8_eligible: false
    gate9_eligible: false
    embedding_ready: false
    boltz_ready: false
    validated_ortholog_claim_allowed: false
    biological_claim_allowed: false
    downstream_block_status_after_review: blocked_gate4_gate5
    allowed_next_action_after_review: perform_second_reviewer_provenance_review
    claim_status_after_review: repair_worklist

acceptable_evidence_source_types:
  - reviewed_uniprot_entry
  - uniprot_ortholog_or_taxonomy_evidence
  - ncbi_protein_or_gene_record
  - ensembl_orthology_evidence
  - oma_orthology_evidence
  - orthodb_orthology_evidence
  - primary_literature_with_accession_level_evidence
  - project_curated_table_with_source_accession_and_reviewer_note

unacceptable_evidence_source_types:
  - model_output_without_accession_level_provenance
  - embedding_similarity_alone
  - sequence_similarity_without_species_or_taxid_provenance
  - llm_generated_assertion_without_external_source_evidence
  - filename_or_local_cache_path_without_source_provenance
  - candidate_name_without_accession_evidence
  - downstream_enrichment_result
  - boltz_af3_chai_or_cofolding_result
  - biological_narrative_without_source_accession_evidence

allowed_language:
  - manual provenance review
  - repair evidence review
  - reviewed-for-planning provenance evidence
  - Gate 4 / Gate 5 blocker review
  - later explicit Gate 4 / Gate 5 policy update

disallowed_language:
  - validated ortholog
  - validated longevity signal
  - validated biological hit
  - confirmed binding change
  - confirmed functional effect
  - Gate 8 eligible
  - Gate 9 eligible
  - embedding ready
  - Boltz ready
  - safe to port
  - proven pro-longevity variant

required_guardrails:
  - unreviewed rows remain valid blocked repair-queue worklist items
  - reviewed decisions do not fetch sequences
  - reviewed decisions do not curate orthologs automatically
  - reviewed decisions do not call Biohub
  - reviewed decisions do not generate embeddings
  - reviewed decisions do not call Boltz
  - reviewed decisions do not rerun enrichment or contrast
  - reviewed decisions do not promote Gate 8
  - reviewed decisions do not promote Gate 9
  - reviewed decisions do not make biological claims
