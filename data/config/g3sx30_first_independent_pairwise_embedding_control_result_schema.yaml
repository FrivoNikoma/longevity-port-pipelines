name: g3sx30_first_independent_pairwise_embedding_control_result
description: >
  First independent numerical embedding-space comparator result for the
  source-backed human MDM2 Q00987 versus elephant MDM2 G3SX30 pairwise lane.
  The comparator was selected before similarity inspection from existing local
  ignored ESMC artifacts using a frozen technical and committed-provenance rule.
  The selected comparator is the curated Brandt's bat P09874 candidate
  EPQ16369.1. This result does not make a biological claim.
version: 1

sources:
  pairwise_summary:
    table: data/input/g3sx30_first_human_elephant_mdm2_mean_pooled_pairwise_summaries.csv
    row_index: 1
    required_status: first_human_elephant_mdm2_mean_pooled_embedding_summary_created
    required_baseline_cosine_similarity: 0.9973314302339468
  robustness_check:
    table: data/input/g3sx30_first_controlled_human_elephant_mdm2_pairwise_embedding_robustness_checks.csv
    row_index: 1
    required_status: first_controlled_pairwise_embedding_robustness_check_created
    required_next_step: add_first_independent_pairwise_embedding_control_result_before_interpretation
  comparator_provenance:
    documents:
      - docs/brandts_bat_p09874_curated_embedding_preflight.md
      - docs/brandts_bat_p09874_live_embedding_generation.md
      - docs/brandts_bat_p09874_downstream_readiness.md
    required_source_accession: P09874
    required_target_accession: EPQ16369.1
    required_target_accession_db: NCBI Protein
    required_target_species: brandts_bat
    required_target_taxid: 109478
    required_curated_status: primary_candidate

selection:
  frozen_before_similarity: true
  inventory_similarity_computed: false
  existing_local_ignored_embeddings_only: true
  required_model: esmc-300m-2024-12
  required_ndim: 2
  required_embedding_dimension: 960
  required_dtype: float32
  required_finite: true
  excluded_path_terms:
    - mdm2
    - tp53
  required_exact_committed_reference: true
  preferred_taxid: 9606
  fallback: any_other_taxid
  tie_breaker: lexicographically_smallest_repository_relative_artifact_path
  observed_embedding_file_count: 216
  observed_technical_candidate_count: 1

local_runtime_artifacts:
  anchor:
    accession: Q00987
    gene_symbol: MDM2
    species: Homo sapiens
    taxid: 9606
    path: data/output/embeddings/esmc-300m-2024-12/tp53_mdm2_elephant_seed_mdm2_chain_mdm2_9606.npy
    required_shape: 491x960
    required_dtype: float32
    required_finite: true
    committed: false
  independent_comparator:
    source_accession: P09874
    target_accession: EPQ16369.1
    target_accession_db: NCBI Protein
    species: brandts_bat
    taxid: 109478
    complex_id: 4xhu__A1_P09874--4xhu__B1_Q9UNS1
    chain: receptor
    path: data/output/embeddings/esmc-300m-2024-12/4xhu__A1_P09874--4xhu__B1_Q9UNS1_receptor_109478.npy
    required_shape: 1024x960
    required_dtype: float32
    required_finite: true
    committed: false

calculation:
  type: human_mdm2_to_preselected_non_mdm2_non_tp53_source_backed_embedding_comparator
  pooling: independent_mean_pooling_over_residue_axis
  residue_alignment_performed: false
  metric: cosine_similarity
  metric_calculation_dtype: float64
  output_decimal_places: 16

output:
  table: data/input/g3sx30_first_independent_pairwise_embedding_control_results.csv
  required_status: first_independent_pairwise_embedding_control_result_created
  required_scope: numerical_embedding_space_independent_control_only_no_biological_claim
  control_result_created: true
  one_row_only: true
  metrics:
    baseline_mdm2_cosine_similarity: 0.9973314302339468
    independent_control_cosine_similarity: 0.8316190559481323
    baseline_minus_control_delta: 0.1657123742858144
    baseline_greater_than_independent_control: true
  external_result:
    storage_scope: external_non_committed_json_outside_repo
    required_sha256: 577b0b24c6a0657c78e0db2ab8b71499cf8dd2a5dd72b6ee33c241058bdbcf23

claim_policy:
  numerical_embedding_space_control: true
  biological_negative_control_claim: false
  residue_alignment_result: false
  interface_result: false
  binding_result: false
  orthology_proof: false
  functional_equivalence_claim: false
  longevity_evidence: false
  biological_claim: false

boundary:
  biohub_esmc_call: false
  new_embedding_generation: false
  npy_artifact_commit: false
  raw_embedding_vectors_commit: false
  data_output_artifact_commit: false
  boltz_call: false
  af3_call: false
  chai_call: false
  enrichment_rerun: false
  contrast_rerun: false
  gate8_promotion: false
  gate9_promotion: false

next_step:
  action: add_first_matched_elephant_mdm2_independent_control_result_before_interpretation
  comparator_must_remain_frozen: true
  no_biological_interpretation_from_single_independent_control: true
  no_additional_control_plan_only_layer: true
  no_additional_non_result_layer_before_next_concrete_step: true
