name: tp53_mdm2_first_human_reference_interface_residue_extraction_result
description: >
  First result-bearing extraction of the human TP53/MDM2 interface-residue
  masks from experimental RCSB PDB 1YCR. The result commits one summary row
  and one row per extracted interface residue while preserving the boundary
  between geometric contact masks, interface scores, controls, and biological
  interpretation.
version: 1

