name: tp53_mdm2_first_control_closure_result
description: >
  First result-bearing TP53/MDM2 control-package closure. It aggregates the
  committed interface-ready manifest, human-reference interface extraction,
  MDM2 shuffled-mask control, and curated NEGATOME-style reviewed-no-computable
  outcome. The aggregation package is closed with an explicit information
  blocker; Gate 6 control readiness remains blocked and Gate 7 entry is false.
version: 1

