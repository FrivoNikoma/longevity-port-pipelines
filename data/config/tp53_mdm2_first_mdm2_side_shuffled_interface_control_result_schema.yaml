name: tp53_mdm2_first_mdm2_side_shuffled_interface_control_result
description: >
  First result-bearing deterministic same-size shuffled-interface control for
  the human 1YCR MDM2 chain-A geometric contact mask. The result compares the
  true 47-residue mask with 1000 uniformly sampled 47-residue masks from the
  same observed 85-residue chain and records compact sequence-run metrics.
version: 1

