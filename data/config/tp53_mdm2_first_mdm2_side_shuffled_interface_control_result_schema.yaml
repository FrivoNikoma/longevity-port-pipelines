source:
  extraction_table: data/input/tp53_mdm2_first_human_reference_interface_residue_extraction_results.csv
  extraction_row_index: 1
  required_status: first_tp53_mdm2_human_reference_interface_residue_extraction_result_created
  required_next_step: add_first_tp53_mdm2_mdm2_side_shuffled_interface_control_result
  residue_table: data/input/tp53_mdm2_first_human_reference_interface_residue_records.csv
  structure_id: 1YCR
  structure_model: 1
  mdm2:
    uniprot: Q00987
    chain_id: A
    chain_residue_count: 85
    true_interface_residue_count: 47
  tp53:
    chain_id: B
    within_chain_shuffle_degenerate: true

control:
  scope: mdm2_chain_A_only_same_size_masks_within_observed_85_residue_chain
  rng_library: numpy
  rng_algorithm: numpy.random.default_rng
  rng_seed: 42
  n_permutations: 1000
  sample_size: 47
  replacement: false
  sorted_indices: true
  control_mask_stream_sha256: 6ebc3aea77388a9929d945acdb1962fe8eed148feecac7326fcbeceefbe2015c
  metrics:
    - adjacent_pair_count
    - contiguous_run_count
    - longest_run_length

result:
  true_adjacent_pair_count: 38
  shuffled_adjacent_pair_count_mean: 25.4239999999999995
  shuffled_adjacent_pair_count_ge_true_count: 0
  adjacent_pair_empirical_upper_p_add_one: 0.0009990009990010
  true_contiguous_run_count: 9
  shuffled_contiguous_run_count_mean: 21.5760000000000005
  shuffled_contiguous_run_count_le_true_count: 0
  contiguous_run_empirical_lower_p_add_one: 0.0009990009990010
  true_longest_run_length: 16
  shuffled_longest_run_length_mean: 6.6260000000000003
  shuffled_longest_run_length_ge_true_count: 1
  longest_run_empirical_upper_p_add_one: 0.0019980019980020

