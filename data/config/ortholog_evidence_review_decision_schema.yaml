schema_version: 1
schema_id: ortholog_evidence_review_decision_schema
pipeline_gate: ortholog_evidence_review_decision
claim_policy: no_biological_claims_until_validation
maximum_claim_status: repair_worklist
description: >
  Conservative reviewed-decision scaffold for ortholog evidence intake rows
  that are ready for later reviewed-decision work.
purpose: >
  Defines a blocker-first reviewed-decision table for ortholog evidence rows
  after accession-level evidence intake or second review. A row in this table
  may record reviewed-for-planning provenance evidence, but it is not a Gate 4
  / Gate 5 policy update, not Gate 8 or Gate 9 eligibility, not sequence
  fetching permission, not embedding or cofolding readiness, and not a
  biological claim.

review_decision_scope:
  allowed_review_sources:
    - ortholog_evidence_intake
    - ortholog_evidence_second_review
  from_intake_outcome:
    - evidence_ready_for_review_decision
  from_second_review_decision:
    - ready_for_later_reviewed_decision_pr
  to_status: reviewed_for_planning_provenance_evidence
  does_not_authorize:
    - automatic Gate 4 / Gate 5 policy update
    - Gate 8 eligibility
    - Gate 9 eligibility
    - sequence fetch
    - Biohub calls
    - embedding generation
    - Boltz readiness
    - AF3 readiness
    - Chai readiness
    - validated ortholog claims
    - validated biological signal claims
    - biological claims

required_row_identity_fields:
  - candidate_set
  - lane_name
  - candidate_id
  - review_source_table
  - review_source_row_index
  - intake_table
  - intake_source_table
  - intake_source_row_index
  - gene_symbol
  - source_species
  - target_species
  - target_species_taxid
  - source_uniprot
  - partner_uniprot
  - evidence_source_type
  - evidence_source_database
  - evidence_source_accession
  - target_taxid
  - target_species_name
  - target_gene_symbol
  - target_protein_accession
  - target_sequence_length

required_review_fields:
  - review_source_status_before_review
  - review_source_decision_before_review
  - review_decision
  - reviewed_target_uniprot
  - reviewed_source_database
  - reviewed_source_accession
  - reviewed_sequence_length
  - reviewed_taxid
  - review_evidence_uri_or_note
  - reviewer_note
  - downstream_block_status_after_review
  - allowed_next_action_after_review
  - claim_policy_after_review
  - claim_status_after_review
  - forbidden_actions_after_review

allowed_review_source_statuses_before_review:
  - evidence_ready_for_review_decision
  - second_review_complete_still_blocked

allowed_review_source_decisions_before_review:
  - evidence_ready_for_review_decision
  - ready_for_later_reviewed_decision_pr

allowed_review_decisions:
  - accepted_for_planning_after_review
  - rejected_after_review
  - needs_additional_source_evidence
  - conflict_or_exclude
  - keep_blocked_until_manual_review

allowed_downstream_block_statuses_after_review:
  - reviewed_for_planning_still_policy_blocked
  - blocked_gate4_gate5

allowed_claim_statuses_after_review:
  - repair_worklist

allowed_claim_policies_after_review:
  - no_biological_claims_until_validation

review_decision_rules:
  accepted_for_planning_after_review:
    gate4_gate5_policy_update_allowed_later_explicit_pr_only: true
    automatic_gate4_gate5_policy_update_allowed: false
    gate8_eligible: false
    gate9_eligible: false
    embedding_ready: false
    biohub_ready: false
    boltz_ready: false
    af3_ready: false
    chai_ready: false
    validated_ortholog_claim_allowed: false
    biological_claim_allowed: false
    downstream_block_status_after_review: reviewed_for_planning_still_policy_blocked
    allowed_next_action_after_review: consider_later_explicit_gate4_gate5_policy_update
    claim_status_after_review: repair_worklist
  rejected_after_review:
    gate4_gate5_policy_update_allowed_later_explicit_pr_only: false
    automatic_gate4_gate5_policy_update_allowed: false
    gate8_eligible: false
    gate9_eligible: false
    embedding_ready: false
    biohub_ready: false
    boltz_ready: false
    af3_ready: false
    chai_ready: false
    validated_ortholog_claim_allowed: false
    biological_claim_allowed: false
    downstream_block_status_after_review: blocked_gate4_gate5
    allowed_next_action_after_review: keep_row_excluded_from_downstream_planning
    claim_status_after_review: repair_worklist
  needs_additional_source_evidence:
    gate4_gate5_policy_update_allowed_later_explicit_pr_only: false
    automatic_gate4_gate5_policy_update_allowed: false
    gate8_eligible: false
    gate9_eligible: false
    embedding_ready: false
    biohub_ready: false
    boltz_ready: false
    af3_ready: false
    chai_ready: false
    validated_ortholog_claim_allowed: false
    biological_claim_allowed: false
    downstream_block_status_after_review: blocked_gate4_gate5
    allowed_next_action_after_review: defer_until_stronger_source_evidence_exists
    claim_status_after_review: repair_worklist
  conflict_or_exclude:
    gate4_gate5_policy_update_allowed_later_explicit_pr_only: false
    automatic_gate4_gate5_policy_update_allowed: false
    gate8_eligible: false
    gate9_eligible: false
    embedding_ready: false
    biohub_ready: false
    boltz_ready: false
    af3_ready: false
    chai_ready: false
    validated_ortholog_claim_allowed: false
    biological_claim_allowed: false
    downstream_block_status_after_review: blocked_gate4_gate5
    allowed_next_action_after_review: prepare_later_rejection_or_exclusion_review
    claim_status_after_review: repair_worklist
  keep_blocked_until_manual_review:
    gate4_gate5_policy_update_allowed_later_explicit_pr_only: false
    automatic_gate4_gate5_policy_update_allowed: false
    gate8_eligible: false
    gate9_eligible: false
    embedding_ready: false
    biohub_ready: false
    boltz_ready: false
    af3_ready: false
    chai_ready: false
    validated_ortholog_claim_allowed: false
    biological_claim_allowed: false
    downstream_block_status_after_review: blocked_gate4_gate5
    allowed_next_action_after_review: perform_manual_ortholog_evidence_review
    claim_status_after_review: repair_worklist

acceptable_evidence_source_types:
  - reviewed_uniprot_entry
  - uniprot_ortholog_or_taxonomy_evidence
  - ncbi_protein_or_gene_record
  - ensembl_orthology_evidence
  - oma_orthology_evidence
  - orthodb_orthology_evidence
  - primary_literature_with_accession_level_evidence
  - project_curated_table_with_source_accession_and_reviewer_note

unacceptable_evidence_source_types:
  - model_output_without_accession_level_provenance
  - embedding_similarity_alone
  - sequence_similarity_without_species_or_taxid_provenance
  - llm_generated_assertion_without_external_source_evidence
  - filename_or_local_cache_path_without_source_provenance
  - downstream_enrichment_result
  - boltz_af3_chai_or_cofolding_result
  - biological_narrative_without_source_accession_evidence

allowed_language:
  - reviewed-decision scaffold
  - reviewed-for-planning provenance evidence
  - still policy-blocked
  - later explicit Gate 4 / Gate 5 policy update PR
  - no biological claims until validation

disallowed_language:
  - validated ortholog
  - validated longevity signal
  - validated biological hit
  - confirmed binding change
  - confirmed functional effect
  - Gate 8 eligible
  - Gate 9 eligible
  - embedding ready
  - Biohub ready
  - Boltz ready
  - AF3 ready
  - Chai ready
  - safe to port
  - proven pro-longevity variant

required_guardrails:
  - reviewed-decision rows do not automatically update Gate 4 / Gate 5 policy
  - reviewed-decision rows do not fetch sequences
  - reviewed-decision rows do not call Biohub
  - reviewed-decision rows do not generate embeddings
  - reviewed-decision rows do not call Boltz
  - reviewed-decision rows do not call AF3
  - reviewed-decision rows do not call Chai
  - reviewed-decision rows do not rerun enrichment or contrast
  - reviewed-decision rows do not promote Gate 8
  - reviewed-decision rows do not promote Gate 9
  - reviewed-decision rows do not make biological claims
