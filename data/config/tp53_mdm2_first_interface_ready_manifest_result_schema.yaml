name: tp53_mdm2_first_interface_ready_manifest_result
description: >
  First result-bearing TP53/MDM2 interface-ready manifest. It fixes the exact
  human 1YCR chains, interface-residue source, partner context, reviewed
  elephant MDM2 mapping, unresolved elephant TP53 blocker, and
  structure-confidence policy before any interface extraction or scoring.
version: 1

required_fields:
  - candidate_set
  - lane_name
  - manifest_id
  - manifest_status
  - manifest_scope
  - source_three_comparator_summary_table
  - source_three_comparator_summary_row_index
  - source_three_comparator_required_next_step
  - source_human_reference_manifest_table
  - source_human_tp53_row_index
  - source_human_mdm2_row_index
  - human_reference_structure_database
  - human_reference_structure_id
  - human_reference_structure_method_policy
  - human_reference_model_policy
  - human_mdm2_candidate_id
  - human_mdm2_chain_id
  - human_mdm2_uniprot
  - human_tp53_candidate_id
  - human_tp53_chain_id
  - human_tp53_uniprot
  - partner_context
  - interface_residue_source_type
  - interface_residue_extractor_reference
  - interface_distance_cutoff_angstrom
  - interface_atom_policy
  - interface_residue_indexing_policy
  - interface_residue_extraction_ready
  - interface_residues_extracted
  - interface_scoring_performed
  - structure_confidence_policy
  - prediction_confidence_metrics_used
  - elephant_target_species
  - elephant_target_taxid
  - elephant_mdm2_candidate_id
  - elephant_mdm2_target_accession
  - elephant_mdm2_target_database
  - elephant_mdm2_sequence_length
  - elephant_mdm2_sequence_sha256
  - elephant_mdm2_mapping_source
  - elephant_mdm2_mapping_status
  - elephant_tp53_candidate_id
  - elephant_tp53_target_accession
  - elephant_tp53_target_database
  - elephant_tp53_mapping_source
  - elephant_tp53_mapping_status
  - elephant_pairwise_mapping_complete
  - comparative_elephant_interface_scoring_ready
  - blocking_reason
  - breakage_interpretation_policy
  - claim_policy
  - human_interface_extraction_manifest_ready
  - result_created
  - structure_call_performed
  - npy_artifact_read
  - npy_artifact_committed
  - data_output_artifact_committed
  - biohub_esmc_called
  - boltz_called
  - af3_called
  - chai_called
  - gate8_promoted
  - gate9_promoted
  - biological_claim_made
  - next_step
  - result_date
  - claim_note

sources:
  three_comparator_summary:
    table: data/input/g3sx30_first_three_comparator_pairwise_embedding_control_summaries.csv
    row_index: 1
    required_next_step: add_first_tp53_mdm2_interface_ready_manifest_result
  human_reference_manifest:
    table: data/input/tp53_mdm2_pilot_manifest.csv
    tp53_row_index: 1
    mdm2_row_index: 2
  elephant_mdm2_mapping:
    table: data/input/reviewed_target_sequence_provenance.csv
    row_index: 2
    accession: G3SX30
    required_status: reviewed_sequence_provenance
  elephant_tp53_mapping:
    table: data/input/tp53_mdm2_ortholog_repair_decisions.csv
    row_index: 1
    accession: unresolved
    required_status: blocked_pending_source_ortholog_provenance

human_reference:
  structure_database: RCSB_PDB
  structure_id: 1YCR
  model_policy: model_1_only
  mdm2_chain: A
  mdm2_uniprot: Q00987
  tp53_chain: B
  tp53_uniprot: P04637
  partner_context: human_mdm2_chain_A_bound_to_human_tp53_chain_B_in_1YCR

interface_residue_source:
  method: inter_chain_heavy_atom_distance_from_human_reference_structure
  extractor: src/longevity_port_pipelines/stages/interface.py::extract_interface_residues
  distance_cutoff_angstrom: 8.0
  indexing_policy: zero_based_chain_local_residue_indices
  extraction_ready: true
  residues_extracted: false
  scoring_performed: false

elephant_mapping:
  target_species: Loxodonta africana
  target_taxid: 9785
  mdm2_accession: G3SX30
  mdm2_mapping_status: reviewed_sequence_provenance
  tp53_accession: unresolved
  tp53_mapping_status: blocked_pending_source_ortholog_provenance
  pairwise_mapping_complete: false
  comparative_interface_scoring_ready: false

claim_policy:
  technical_checkpoint_no_claim: true
  biological_claim: false
  binding_result: false
  interface_score_result: false
  comparative_elephant_result: false

boundary:
  structure_call: false
  interface_extraction: false
  interface_scoring: false
  npy_artifact_read: false
  npy_artifact_commit: false
  data_output_artifact_commit: false
  biohub_esmc_call: false
  boltz_call: false
  af3_call: false
  chai_call: false
  gate8_promotion: false
  gate9_promotion: false

next_step:
  action: add_first_tp53_mdm2_human_reference_interface_residue_extraction_result
  no_preflight_only_layer: true
  no_inventory_only_layer: true
  no_plan_only_layer: true
  no_review_or_scaffold_only_layer: true
