name: tp53_mdm2_first_curated_negatome_interface_control_result
description: First result-bearing no-embedding curated NEGATOME-style interface-control review for the
  human 1YCR MDM2 chain-A geometric mask. One peer-reviewed negative co-immunoprecipitation context is
  reviewed. The record is concrete, but no MDM2-side residue-level negative context exists, so no interface-control
  metric is computed and no surrogate metric is invented.
