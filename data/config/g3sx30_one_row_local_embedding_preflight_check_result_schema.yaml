name: g3sx30_one_row_local_embedding_preflight_check_result
description: >
  Machine-readable record of the externally executed local preflight check for
  the already-generated local runtime G3SX30 / elephant MDM2 ESMC embedding
  artifact. The check validates the local non-committed .npy artifact and
  records the result without committing the artifact or external JSON.
version: 1

source_binding_table: data/input/g3sx30_one_row_non_committed_preflight_input_bindings.csv
source_binding_row_index: 1
external_observation_json: D:/biohub_projects/_chatgpt_observations/g3sx30_one_row_local_embedding_preflight_check.json
result_table: data/input/g3sx30_one_row_local_embedding_preflight_check_results.csv

required_columns:
  - candidate_set
  - lane_name
  - candidate_id
  - target_accession
  - target_accession_db
  - target_species
  - target_taxid
  - gene_symbol
  - source_binding_table
  - source_binding_row_index
  - source_binding_status
  - check_name
  - check_status
  - external_observation_json
  - local_embedding_path
  - artifact_location
  - local_runtime_embedding_exists
  - local_runtime_embedding_tracked
  - local_runtime_embedding_committed
  - git_ignore_rule_status
  - embedding_shape
  - embedding_dtype
  - embedding_finite
  - sequence_length
  - sequence_length_matches
  - approved_for_one_row_readiness_preflight_input
  - non_committed_preflight_input_reference_created
  - biohub_esmc_called_by_check
  - live_embedding_rerun_by_check
  - embedding_generation_performed_by_check
  - npy_artifact_created_by_check
  - data_output_artifact_committed
  - external_validation_json_committed
  - ready_for_preflight_promoted
  - gate8_promoted
  - gate9_promoted
  - boltz_called
  - af3_called
  - chai_called
  - enrichment_rerun
  - contrast_rerun
  - biological_claim_made
  - downstream_gate_unlocked
  - next_practical_decision
  - pass_decision_path
  - fail_decision_path
  - forbidden_actions
  - reviewer_id
  - check_date
  - result_note

required_values:
  source_binding_table: data/input/g3sx30_one_row_non_committed_preflight_input_bindings.csv
  source_binding_row_index: "1"
  source_binding_status: non_committed_preflight_input_reference_created
  candidate_id: tp53_mdm2_elephant_seed_mdm2_chain
  target_accession: G3SX30
  target_accession_db: UniProtKB TrEMBL
  target_species: Loxodonta africana
  target_taxid: "9785"
  gene_symbol: MDM2
  check_name: g3sx30_one_row_local_embedding_preflight_check
  check_status: local_preflight_pass
  external_observation_json: D:/biohub_projects/_chatgpt_observations/g3sx30_one_row_local_embedding_preflight_check.json
  local_embedding_path: data/output/embeddings/esmc-300m-2024-12/tp53_mdm2_elephant_seed_mdm2_chain_mdm2_9785.npy
  artifact_location: local_runtime_data_output_ignored_by_git
  local_runtime_embedding_exists: "true"
  local_runtime_embedding_tracked: "false"
  local_runtime_embedding_committed: "false"
  git_ignore_rule_status: data_output_ignored
  embedding_shape: 492x960
  embedding_dtype: float32
  embedding_finite: "true"
  sequence_length: "492"
  sequence_length_matches: "true"
  approved_for_one_row_readiness_preflight_input: "true"
  non_committed_preflight_input_reference_created: "true"
  biohub_esmc_called_by_check: "false"
  live_embedding_rerun_by_check: "false"
  embedding_generation_performed_by_check: "false"
  npy_artifact_created_by_check: "false"
  data_output_artifact_committed: "false"
  external_validation_json_committed: "false"
  ready_for_preflight_promoted: "false"
  gate8_promoted: "false"
  gate9_promoted: "false"
  boltz_called: "false"
  af3_called: "false"
  chai_called: "false"
  enrichment_rerun: "false"
  contrast_rerun: "false"
  biological_claim_made: "false"
  downstream_gate_unlocked: "false"
  next_practical_decision: approve_one_row_readiness_preflight_transition_path_or_repair_concrete_blocker
  pass_decision_path: approve_one_row_readiness_preflight_transition_path
  fail_decision_path: repair_concrete_local_preflight_blocker

allowed_true_flags:
  - local_runtime_embedding_exists
  - embedding_finite
  - sequence_length_matches
  - approved_for_one_row_readiness_preflight_input
  - non_committed_preflight_input_reference_created

required_false_flags:
  - local_runtime_embedding_tracked
  - local_runtime_embedding_committed
  - biohub_esmc_called_by_check
  - live_embedding_rerun_by_check
  - embedding_generation_performed_by_check
  - npy_artifact_created_by_check
  - data_output_artifact_committed
  - external_validation_json_committed
  - ready_for_preflight_promoted
  - gate8_promoted
  - gate9_promoted
  - boltz_called
  - af3_called
  - chai_called
  - enrichment_rerun
  - contrast_rerun
  - biological_claim_made
  - downstream_gate_unlocked

forbidden_actions:
  - Biohub call
  - ESMC call
  - live embedding rerun
  - embedding generation
  - .npy commit
  - data/output commit
  - external FASTA commit
  - external live log commit
  - external validation JSON commit
  - ready_for_preflight promotion
  - Gate 8 promotion
  - Gate 9 promotion
  - Boltz call
  - AF3 call
  - Chai call
  - enrichment rerun
  - contrast rerun
  - biological claim
