name: g3sx30_manifest_aware_dry_run_wrapper_scaffold
description: >
  Non-executable helper/table scaffold representing the future G3SX30
  manifest-aware dry-run wrapper boundary. This scaffold reads the blocked
  adapter policy contract, adapter scaffold, and dry-run preflight manifest
  rows, then records that execution remains blocked. It is not a Typer
  executable wrapper and does not select a command or output path.
status: wrapper_scaffold_runtime_blocked_table_only_no_runtime_side_effects
sources:
  policy_contract_row: data/input/g3sx30_manifest_aware_adapter_policy_contract.csv#1
  adapter_scaffold_row: data/interim/g3sx30_manifest_aware_dry_run_preflight_adapter_scaffold.csv#1
  manifest_row: data/input/g3sx30_dry_run_preflight_manifest.csv#1
layer_separation:
  adapter_scaffold: instance-level understanding of manifest row #1
  adapter_policy_contract: machine-readable allowed transition contract after scaffold
  wrapper_scaffold: non-executable representation of a future wrapper boundary
  wrapper_command_contract: future command/argument/output-path contract, not this scaffold
  wrapper_execution: not authorized by this scaffold
  dry_run_execution: still later, not this scaffold
  live_embedding_fill: much later, not this scaffold
allowed_wrapper_statuses:
  - wrapper_scaffold_runtime_blocked
allowed_wrapper_decisions:
  - prepare_wrapper_plan_only
allowed_next_actions_after_wrapper_scaffold:
  - add_wrapper_command_contract_pr
  - add_source_level_wrapper_guardrail_pr
  - keep_runtime_blocked
does_not_authorize:
  - pyproject script entry point
  - Typer executable wrapper
  - manifest-aware wrapper implementation
  - wrapper execution
  - dry-run execution
  - live execution
  - curated-embedding-preflight run
  - curated_embedding_preflight run
  - curated-embedding-single run
  - curated_embedding_single run
  - help run
  - command selection
  - output path selection
  - execution plan materialization
  - Biohub call
  - ESMC call
  - embedding generation
  - .npy artifact
  - data/output artifact commit
  - ready_for_preflight
  - manifest runtime unlock
  - Gate 8 promotion
  - Gate 9 promotion
  - Boltz call
  - AF3 call
  - Chai call
  - enrichment rerun
  - contrast rerun
  - biological claim
