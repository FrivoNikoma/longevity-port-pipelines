name: g3sx30_wrapper_dry_run_execution_plan_review
description: >
  Final non-execution review decision for the selected G3SX30 wrapper dry-run
  execution plan scaffold. Approves or rejects the selected command form and
  external non-committed output path for the next PR only.
primary_key:
  - candidate_id
  - target_accession
  - source_execution_plan_scaffold_row_index
required_columns:
  - source_execution_plan_scaffold_table
  - source_execution_plan_scaffold_row_index
  - source_entrypoint_boundary_module
  - source_manifest_table
  - source_manifest_row_index
  - candidate_id
  - target_accession
  - target_accession_db
  - target_species
  - target_taxid
  - gene_symbol
  - reviewed_sequence_length
  - reviewed_sequence_sha256
  - review_status
  - review_scope
  - review_decision
  - script_entry_point
  - selected_future_command_form
  - selected_future_manifest_path
  - selected_future_manifest_row_index
  - selected_external_output_path
  - selected_command_form_reviewed
  - selected_external_output_path_reviewed
  - selected_manifest_row_reviewed
  - command_form_review_decision
  - external_output_path_review_decision
  - dry_run_execution_authorized_for_next_pr
  - dry_run_execution_authorized_in_this_pr
  - dry_run_executed
  - live_execution_authorized
  - manifest_execution_authorized_in_this_pr
  - biohub_esmc_authorized
  - embedding_generation_authorized
  - npy_artifact_authorized
  - output_file_created
  - output_directory_created
  - data_output_artifact_commit_authorized
  - ready_for_preflight_authorized
  - gate8_promotion_authorized
  - gate9_promotion_authorized
  - biological_claim_authorized
  - runtime_still_blocked_in_this_pr
  - next_pr_must_use_reviewed_command_form
  - next_pr_must_use_reviewed_external_output_path
  - allowed_next_action_after_review
  - claim_status
  - forbidden_actions_this_pr
  - review_note
controlled_values:
  review_status:
    - dry_run_execution_plan_scaffold_reviewed
  review_scope:
    - final_non_execution_review_before_actual_dry_run_pr
  review_decision:
    - approve_selected_external_output_dry_run_for_next_pr
    - reject_selected_plan_with_concrete_blocker
  command_form_review_decision:
    - approve_selected_wrapper_dry_run_command_form
  external_output_path_review_decision:
    - approve_external_non_committed_output_path
  allowed_next_action_after_review:
    - execute_g3sx30_wrapper_dry_run_with_external_output_path
  claim_status:
    - technical_checkpoint
required_true_columns:
  - selected_command_form_reviewed
  - selected_external_output_path_reviewed
  - selected_manifest_row_reviewed
  - dry_run_execution_authorized_for_next_pr
  - runtime_still_blocked_in_this_pr
  - next_pr_must_use_reviewed_command_form
  - next_pr_must_use_reviewed_external_output_path
required_false_columns:
  - dry_run_execution_authorized_in_this_pr
  - dry_run_executed
  - live_execution_authorized
  - manifest_execution_authorized_in_this_pr
  - biohub_esmc_authorized
  - embedding_generation_authorized
  - npy_artifact_authorized
  - output_file_created
  - output_directory_created
  - data_output_artifact_commit_authorized
  - ready_for_preflight_authorized
  - gate8_promotion_authorized
  - gate9_promotion_authorized
  - biological_claim_authorized
forbidden_this_pr:
  - dry-run execution
  - live execution
  - manifest execution in this PR
  - Biohub / ESMC call
  - embedding generation
  - .npy artifact
  - output file creation
  - output directory creation
  - data/output artifact commit
  - ready_for_preflight
  - Gate 8 promotion
  - Gate 9 promotion
  - Boltz / AF3 / Chai
  - biological claim
