schema_version: 1
schema_id: tp53_mdm2_mdm2_missing_embedding_fill_manifest_schema
pipeline_gate: scoped_mdm2_missing_embedding_fill_execution_contract
claim_policy: no_biological_claims_until_validation
maximum_claim_status: technical_execution_contract

description: >
  Specialized two-row metadata-only execution contract for the missing
  P23804 and A0ABM2YB85 MDM2 embeddings. It is validated from committed
  external-binding and local-prerequisite sources and does not authorize
  live embedding generation.

source_external_binding_table: data/input/tp53_mdm2_mdm2_external_exact_sequence_binding_results.csv
source_local_prerequisite_table: data/input/tp53_mdm2_mdm2_gate8_local_prerequisite_audit_results.csv
manifest_table: data/input/tp53_mdm2_mdm2_missing_embedding_fill_manifest.csv

required_accessions:
  - P23804
  - A0ABM2YB85

required_values:
  manifest_contract_version: "1"
  gene_symbol: MDM2
  embedding_model: esmc-300m-2024-12
  fill_scope: scoped_mdm2_missing_embeddings_only
  execution_mode: table_only
  fill_status: planning_policy_updated_runtime_blocked
  table_only_validation_allowed: "true"
  live_opt_in_required: "true"
  max_live_batch_size: "0"
  authorization_status: pending_explicit_scoped_live_fill_authorization
  live_fill_allowed: "false"
  fill_execution_allowed: "false"
  allowed_next_action: request_explicit_scoped_live_fill_authorization

required_accession_values:
  P23804:
    target_species: mouse
    target_taxid: "10090"
    expected_sequence_length: "489"
    exact_normalized_sequence_sha256: 0841e7c8ebd6a4a9e9e051538600d8f201c6682b3246dfb95ba301ab6233a3e3
    external_normalized_sequence_relative_path: P23804.sequence.txt
    expected_local_embedding_path: data/output/embeddings/esmc-300m-2024-12/tp53_mdm2_elephant_seed_mdm2_chain_mdm2_10090.npy
  A0ABM2YB85:
    target_species: hamster
    target_taxid: "10036"
    expected_sequence_length: "510"
    exact_normalized_sequence_sha256: 77125856d7835e2b31886052c94d818752c49b9eb7bb86dea1f8d5f313159fe5
    external_normalized_sequence_relative_path: A0ABM2YB85.sequence.txt
    expected_local_embedding_path: data/output/embeddings/esmc-300m-2024-12/tp53_mdm2_elephant_seed_mdm2_chain_mdm2_10036.npy

required_source_states:
  external_binding_status: passed_exact_external_non_committed_binding
  local_prerequisite_status: missing
  expected_local_embedding_path_policy_status: data_output_ignored
  embedding_path_declared_only: "true"
  existing_local_embedding_status: missing
  existing_local_embedding_exists: "false"
  existing_local_embedding_tracked: "false"
  existing_local_embedding_committed: "false"
  external_binding_root_required_for_ci: "false"

required_false_flags:
  - live_fill_allowed
  - fill_execution_allowed
  - raw_fasta_committed
  - normalized_sequence_committed
  - biohub_called
  - esmc_called
  - embedding_generated
  - npy_artifact_created
  - npy_artifact_committed
  - data_output_artifact_committed
  - contrast_run
  - gate8_entry_allowed
  - gate8_promoted
  - gate9_promoted
  - biological_claim_made

required_guardrails:
  - exactly two rows
  - no G3SX30 row because its local embedding is present_valid
  - no rat row because rat remains deferred_pending_source
  - no TP53 row because TP53 remains deferred_pending_source
  - no external binding root required for ordinary CI
  - portable relative sequence references only
  - declared embedding paths remain under ignored data/output embeddings
  - no live execution authorization
