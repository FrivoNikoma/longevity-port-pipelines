name: tp53_mdm2_embedding_based_negatome_control_repair_result
description: >
  Result-bearing repair/retry of the first TP53/MDM2 embedding-based
  NEGATOME control attempt. Official mapping and exact negative-partner
  provenance are resolved; the retry remains blocked only because the
  reviewed G3UAZ0 partner embedding is absent.
