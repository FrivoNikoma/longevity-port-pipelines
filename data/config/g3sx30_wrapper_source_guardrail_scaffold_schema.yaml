name: g3sx30_wrapper_source_guardrail_scaffold
description: >
  Non-executable source-level guardrail scaffold for the future G3SX30 wrapper.
  This defines future wrapper source checks only and has no runtime effect.
status: source_guardrail_scaffold_runtime_blocked
sources:
  command_contract_row: data/interim/g3sx30_wrapper_command_contract_scaffold.csv#1
  wrapper_scaffold_row: data/interim/g3sx30_manifest_aware_dry_run_wrapper_scaffold.csv#1
  manifest_row: data/input/g3sx30_dry_run_preflight_manifest.csv#1
  policy_contract_row: data/input/g3sx30_manifest_aware_adapter_policy_contract.csv#1
allowed_language:
